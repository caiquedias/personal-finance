<div class="thought-bubble-wrap">
  <button #triggerBtn class="info-icon" (click)="toggle()" [class.active]="open()" aria-label="Ver detalhes">
    <span>i</span>
  </button>

  @if (open()) {
    <div class="tb-backdrop" (click)="close()"></div>

    <div class="tb-container" [style.bottom.px]="anchorBottom()" [style.left.px]="anchorLeft()">
      <!-- Dots pixel art com cloud.png em escala menor -->
      <div class="tb-dots">
        <div class="tb-dot tb-dot--1" [class.visible]="bubblesPhase() >= 1">
          <img src="cloud.png" class="tb-dot-img" alt="">
        </div>
        <div class="tb-dot tb-dot--2" [class.visible]="bubblesPhase() >= 2">
          <img src="cloud.png" class="tb-dot-img" alt="">
        </div>
        <div class="tb-dot tb-dot--3" [class.visible]="bubblesPhase() >= 3">
          <img src="cloud.png" class="tb-dot-img" alt="">
        </div>
      </div>

      <!-- Cloud: .tb-cloud-wrap faz pop, .tb-cloud-inner faz bounce -->
      @if (bubblesPhase() >= 4) {
        <div class="tb-cloud-wrap">
          <div class="tb-cloud-inner">
            <button class="tb-close" (click)="close()" aria-label="Fechar">✕</button>

            <img class="tb-cloud-img" src="cloud.png" alt="nuvem" />

            <!-- Nuvem grande: typewriter -->
            <div class="tb-content-top">
              <p class="tb-text">{{ displayedText() }}<span class="tb-cursor" [class.hidden]="animDone()">|</span></p>
            </div>

            <!-- Nuvem pequena: valor e vencimento -->
            @if (showDueDate()) {
              <div class="tb-content-bottom">
                <p class="tb-amount">{{ formattedAmount() }}</p>
                <p class="tb-due">
                  @if (isDueWarning()) {
                    <span class="tb-warning">⚠</span>
                  }
                  Venc.: {{ formattedDueDate() }}
                </p>
              </div>
            }
          </div>
        </div>
      }
    </div>
  }
</div>
